[options]
; --- Database ---
db_host = host.docker.internal
db_port = 5432
db_user = odoo
db_password = odoo
; db_name = odoo
; db_template = template0
; db_maxconn = 64
; dbfilter = ^%d$

; --- Paths ---
addons_path = /mnt/extra-addons
data_dir = /var/lib/odoo

; --- Network ---
; http_port = 8069
; longpolling_port = 8072
http_interface = 0.0.0.0
proxy_mode = True

; --- Workers (0 = multi-thread mode, >0 = multi-process) ---
; workers = 0
; max_cron_threads = 2
; limit_memory_hard = 2684354560
; limit_memory_soft = 2147483648
; limit_time_cpu = 60
; limit_time_real = 120
; limit_time_real_cron = -1
; limit_request = 8192

; --- Logging ---
; log_level = info
; log_handler = :INFO
; logfile = None
; log_db = False

; --- Security ---
; admin_passwd = admin
list_db = False
server_wide_modules = base,web

; --- Email ---
; smtp_server = localhost
; smtp_port = 25
; smtp_ssl = False
; smtp_user = False
; smtp_password = False
; email_from = False

; --- Performance ---
; osv_memory_count_limit = 0
; osv_memory_age_limit = 1.0
; transient_age_limit = 1.0

; --- CSV / Import ---
; csv_internal_sep = ,
; import_partial =

; --- Misc ---
without_demo = True
; test_enable = False
; screencasts =
; screenshots = /tmp/odoo_tests
